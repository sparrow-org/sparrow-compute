name: spacrow
channels:
  - conda-forge
dependencies:
  - cxx-compiler
  - cmake >=3.28
  - ninja
  - xtensor =0.27.1
  - xsimd =13.2.0
  - xtl =0.8.0
  - gtest
  - benchmark
  # sparrow 2.4.0 is not available on conda-forge.
  # Build it from source and install into the environment:
  #
  #   git clone https://github.com/sparrow-org/sparrow.git --branch 2.4.0 --depth 1
  #   cd sparrow
  #   cmake -B build -G Ninja \
  #       -D CMAKE_BUILD_TYPE=Release \
  #       -D CMAKE_INSTALL_PREFIX="$CONDA_PREFIX" \
  #       -D BUILD_TESTS=OFF \
  #       -D BUILD_BENCHMARKS=OFF \
  #       -D BUILD_DOCS=OFF \
  #       -D BUILD_EXAMPLES=OFF \
  #       -D SPARROW_BUILD_SHARED=OFF
  #   cmake --build build
  #   cmake --install build
