name: CodSpeed

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash -e -l {0}

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Install GCC
        uses: egor-tensin/setup-gcc@v2
        with:
          version: 16
          platform: x64

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set conda environment
        uses: mamba-org/setup-micromamba@main
        with:
          environment-name: myenv
          environment-file: environment-dev.yml
          init-shell: bash
          cache-downloads: true

      - name: Configure benchmark build
        run: |
          cmake -B build \
                -G Ninja \
                -DCMAKE_INSTALL_PREFIX=$CONDA_PREFIX \
                -DCMAKE_PREFIX_PATH=$CONDA_PREFIX \
                -DCMAKE_BUILD_TYPE=RelWithDebInfo \
                -DSPARROW_COMPUTE_ENABLE_CODSPEED=ON \
                -DSPARROW_COMPUTE_CODSPEED_MODE=simulation \
                -DBUILD_BENCHMARKS=ON \
                -DFETCH_DEPENDENCIES_WITH_CMAKE=MISSING

      - name: Build benchmark target
        run: cmake --build build --target sparrow-compute_bench

      - name: Run CodSpeed benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: ./build/sparrow-compute_bench
