name: CodSpeed

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  benchmarks:
    name: Run benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure benchmark build
        run: |
          cmake -B build \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=RelWithDebInfo \
                -DSPACROW_ENABLE_CODSPEED=ON \
                -DSPACROW_CODSPEED_MODE=simulation \
                -DFETCH_DEPENDENCIES_WITH_CMAKE=ON \

      - name: Build benchmark target
        run: cmake --build build --target spacrow_bench

      - name: Run CodSpeed benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: ./build/relwithdebinfo-simulation/spacrow_bench
